<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4aa6ec"/>
      <stop offset="1" stop-color="#2870bd"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="0.14" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="cast" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="11"
                    flood-color="#0c3a64" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- Squircle tile -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>
  <!-- Libadwaita-style top rim light -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#rim)"/>

  <!-- Flow wave beneath the play (the flume) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <path d="M 150 372 C 190 350, 226 350, 256 366 C 286 382, 322 382, 362 360"
          stroke-width="20" opacity="0.85"/>
    <path d="M 168 410 C 202 392, 232 392, 256 404 C 280 416, 310 416, 344 400"
          stroke-width="14" opacity="0.45"/>
  </g>

  <!-- Play glyph: crisp, rounded corners, soft cast shadow -->
  <path d="M 200 150 L 200 318 L 342 234 Z" fill="#ffffff"
        stroke="#ffffff" stroke-width="28" stroke-linejoin="round" filter="url(#cast)"/>
</svg>
