app-id: com.velkadyne.FreeFlume
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: freeflume

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=xdg-download
  - --filesystem=xdg-pictures
  # Inhibit screensaver/lock + auto-suspend while a video is playing.
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.PowerManagement.Inhibit

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.a'
  - '*.la'

modules:
  # --- libmpv build chain (the runtime ships ffmpeg, but not these) ---
  - name: luajit
    no-autogen: true
    buildsystem: simple
    build-commands:
      - make amalg PREFIX=/app
      - make install PREFIX=/app
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: git
        url: https://github.com/LuaJIT/LuaJIT.git
        branch: v2.1

  - name: libass
    buildsystem: autotools
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/libass/libass.git
        tag: '0.17.3'

  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dvulkan=disabled
      - -Dshaderc=disabled
      - -Dglslang=disabled
      - -Dd3d11=disabled
      - -Ddemos=false
      - -Dtests=false
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://code.videolan.org/videolan/libplacebo.git
        tag: v7.349.0

  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dlua=enabled
      - -Dmanpage-build=disabled
      - -Dbuild-date=false
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/bash-completion
      - /share/zsh
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.40.0

  # --- yt-dlp (self-contained binary; no runtime python needed) ---
  - name: yt-dlp
    buildsystem: simple
    build-commands:
      - install -Dm755 yt-dlp_linux /app/bin/yt-dlp
    sources:
      - type: file
        url: https://github.com/yt-dlp/yt-dlp/releases/download/2026.03.17/yt-dlp_linux
        sha256: c2b0189f581fe4a2ddd41954f1bcb7d327db04b07ed0dea97e4f1b3e09b5dd8e

  # --- Deno: the JS runtime yt-dlp runs YouTube's player JS in to solve the
  #     "nsig" challenge. Without it YouTube serves only SABR/low-res formats;
  #     with it, full resolution works signed-out. Both binaries live in
  #     /app/bin, so yt-dlp finds deno on the sandbox PATH. ---
  - name: deno
    buildsystem: simple
    build-commands:
      - install -Dm755 deno /app/bin/deno
    sources:
      - type: archive
        archive-type: zip
        url: https://github.com/denoland/deno/releases/download/v2.8.3/deno-x86_64-unknown-linux-gnu.zip
        sha256: 30455b845ffa6082209c3590269c910ad3b7efdf28c9879afd4006c47ae54197

  # --- FreeFlume itself ---
  - name: freeflume
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ../..
        skip:
          - build
          - Linux-Release
          - .flatpak-builder
          - .git
    post-install:
      # Rename desktop/icon/metainfo to the Flatpak app-id.
      - cd /app/share/applications && mv org.freeflume.Desktop.desktop com.velkadyne.FreeFlume.desktop
      - sed -i 's/^Icon=freeflume$/Icon=com.velkadyne.FreeFlume/' /app/share/applications/com.velkadyne.FreeFlume.desktop
      - for s in 16 24 32 48 64 128 256 512; do d=/app/share/icons/hicolor/${s}x${s}/apps; if [ -f "$d/freeflume.png" ]; then mv "$d/freeflume.png" "$d/com.velkadyne.FreeFlume.png"; fi; done
      - d=/app/share/icons/hicolor/scalable/apps; if [ -f "$d/freeflume.svg" ]; then mv "$d/freeflume.svg" "$d/com.velkadyne.FreeFlume.svg"; fi
      - install -Dm644 packaging/flatpak/com.velkadyne.FreeFlume.metainfo.xml /app/share/metainfo/com.velkadyne.FreeFlume.metainfo.xml
